                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`

                        model: "llama-3.3-70b-versatile", // Extrem schnelles und fähiges Modell

                        temperature: 0.7,
                        max_tokens: 800

                const unsub = db.collection('artifacts').doc(fbAppId).collection('users').doc(user.uid).collection('logs')
                    .onSnapshot(snap => {
                        const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setHistory(data.sort((a,b) => b.timestamp - a.timestamp));
                    }, err => {
                        console.error("Firebase Snapshot Error:", err);
                    });
                return unsub;
            }, [user]);

            useEffect(() => {
                let interval;
                if (timerActive) interval = setInterval(() => setTimer(t => t + 1), 1000);
                return () => clearInterval(interval);
            }, [timerActive]);

            const toggleSkip = (exId) => {
                if (skipped.includes(exId)) {
                    setSkipped(skipped.filter(id => id !== exId));
                } else {
                    setSkipped([...skipped, exId]);
                }
            };

            const finishWorkout = async () => {
                if (!split) return;

                const finalExercises = {};
                Object.keys(logs).forEach(exId => {
                    if (!skipped.includes(exId)) {
                        finalExercises[exId] = logs[exId];
                    }
                });

                // Wenn kein User existiert (z.B. weil der Firebase-Key fehlt/falsch ist),
                // beende das Training trotzdem, damit man nicht festhängt.
                if (!user) {
                    alert("⚠️ Offline-Modus: Training beendet (Konnte wegen Datenbank-Fehler nicht in der Cloud gespeichert werden).");
                    setSplit(null); 
                    setLogs({}); 
                    setSkipped([]);
                    setTimerActive(false); 
                    setTimer(0); 
                    setCardioCoachRes("");
                    setTab('history');
                    return;
                }

                try {
                    await db.collection('artifacts').doc(fbAppId).collection('users').doc(user.uid).collection('logs').add({
                        phase, 
                        split, 
                        date: new Date().toLocaleDateString('de-DE'),
                        timestamp: Date.now(), 
                        exercises: finalExercises,
                        skippedExercises: skipped,
                        duration: timer
                    });

                    alert("✅ Training erfolgreich gespeichert!");
                    setSplit(null); 
                    setLogs({}); 
                    setSkipped([]);
                    setTimerActive(false); 
                    setTimer(0); 
                    setCardioCoachRes("");
                    setTab('history');
                } catch (e) { 
                    alert("❌ Fehler beim Speichern: " + e.message);
                }
            };

            // KI Assistant: Exercise Alternative
            const getAlternative = async (ex) => {
                setExpandedDetails(ex.id);
                if (aiExerciseResponses[ex.id]) return; 

                setIsAiLoadingMap(p => ({...p, [ex.id]: true}));
                const prompt = `Der Nutzer absolviert die Übung "${ex.name}" (${ex.desc || ''}) an einem Fitness-Kabelzug-Turm. Er möchte diese Übung durch eine andere ersetzen. Nenne EINE starke alternative Übung, begründe kurz, warum sie ein guter Ersatz ist, und erkläre die Ausführung (mit Körpergewicht oder Kabelzug).`;

                // Nutze nun Groq (callAI)
                const res = await callAI(prompt);
                setAiExerciseResponses(p => ({...p, [ex.id]: res}));
                setIsAiLoadingMap(p => ({...p, [ex.id]: false}));
            };

            // KI Assistant: Cardio Coach
            const getCardioAdvice = async (splitKey) => {
                setIsCardioCoachLoading(true);
                const prompt = splitKey === 'boxing' 
                    ? "Gib mir ein intensives 10-Minuten Sandsack-Workout. Nenne 3 bis 4 konkrete Box-Kombinationen (z.B. Jab, Cross, Hook) und gib mir Anweisungen, wie lange ich diese jeweils schlagen soll inkl. Pausenzeiten. Motivierend und direkt!" 
                    : "Gib mir ein motivierendes, knackiges 15-Minuten Bodyweight HIIT Cardio Workout (Laufen, Burpees, Mountain Climbers etc.). Nenne die exakten Intervalle und Übungen.";

                // Nutze nun Groq (callAI)
                const res = await callAI(prompt);
                setCardioCoachRes(res);
                setIsCardioCoachLoading(false);
            };

            const getPhaseLabel = (p) => p === 'cardio' ? 'CARDIO' : p.toUpperCase();

            return (
                <div className="flex flex-col max-w-md mx-auto min-h-screen">
                    <header className="p-6 bg-glass sticky top-0 z-40 flex justify-between items-center shadow-xl">
                        <div>
                            <h1 className="text-2xl font-black italic text-blue-500 uppercase tracking-tighter leading-none">ATLETICA X5</h1>
                            <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">{PHASES[phase]?.name}</p>
                        </div>
                        <div className={`px-4 py-1.5 rounded-full text-xs font-black border transition-all ${timerActive ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20 shadow-lg shadow-emerald-500/20' : 'bg-zinc-800 text-zinc-500 border-zinc-700'}`}>
                            {Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}
                        </div>
                    </header>

                    <main className="flex-1 p-4 overflow-y-auto">
                        {tab === 'workout' && (
                            <div className="space-y-4 animate-fade-in">
                                {!split ? (
                                    <>
                                        <div className="grid grid-cols-5 gap-1 mb-6 bg-zinc-900/50 p-1 rounded-2xl border border-zinc-800">
                                            {Object.keys(PHASES).map(p => (
                                                <button key={p} onClick={() => setPhase(p)} className={`py-2 rounded-xl text-[9px] font-black uppercase transition-all ${phase === p ? (p === 'cardio' ? 'phase-btn-red' : 'phase-btn-active') : 'text-zinc-600'}`}>{getPhaseLabel(p)}</button>
                                            ))}
                                        </div>
                                        {Object.entries(PHASES[phase].splits).map(([key, s]) => (
                                            <button key={key} onClick={() => { setSplit(key); setTimer(0); setTimerActive(true); }}
                                                className="w-full bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] text-left hover:border-blue-500 transition-all flex justify-between items-center shadow-xl">
                                                <div>
                                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter leading-tight">{s.title}</h3>
                                                    <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">{s.exercises.length} {phase === 'cardio' ? 'Übungen' : 'Übungen am Kabel'}</p>
                                                </div>
                                                <div className={`text-blue-500 bg-blue-500/10 p-3 rounded-2xl ${phase === 'cardio' && 'text-red-500 bg-red-500/10'}`}>
                                                    <Icon name="chevron-right" size={24}/>
                                                </div>
                                            </button>
                                        ))}
                                    </>
                                ) : (
                                    <div className="space-y-6 pb-20">
                                        <div className="flex justify-between items-center">
                                            <button onClick={() => {if(confirm("Training abbrechen? Daten gehen verloren.")) setSplit(null)}} className="text-[10px] font-black text-zinc-500 flex items-center gap-1 uppercase tracking-widest hover:text-red-500"><Icon name="rotate-ccw" size={12}/> Abbruch</button>
                                            <h2 className={`text-lg font-black italic uppercase tracking-tighter ${phase === 'cardio' ? 'text-red-500' : 'text-blue-400'}`}>{PHASES[phase].splits[split].title}</h2>
                                        </div>

                                        {/* Cardio Coach Banner */}
                                        {phase === 'cardio' && (
                                            <div className="bg-gradient-to-r from-red-900/40 to-zinc-900 border border-red-900/50 rounded-[2.5rem] p-6 shadow-xl mb-6">
                                                <div className="flex justify-between items-center mb-4">
                                                    <h3 className="font-black italic text-red-500 uppercase flex items-center gap-2 text-lg tracking-tighter"><Icon name="sparkles" size={20}/> Cardio Coach</h3>
                                                </div>
                                                {cardioCoachRes ? (
                                                    <div className="text-sm text-zinc-300 leading-relaxed font-medium whitespace-pre-wrap">{cardioCoachRes}</div>
                                                ) : (
                                                    <button onClick={() => getCardioAdvice(split)} className="bg-red-600/20 text-red-400 hover:bg-red-600/30 w-full py-4 rounded-2xl text-xs font-black uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                                                        {isCardioCoachLoading ? <Icon name="loader-2" className="animate-spin" size={18}/> : "🥊 Workout Kombos generieren"}
                                                    </button>
                                                )}
                                            </div>
                                        )}

                                        {PHASES[phase].splits[split].exercises.map(ex => {
                                            const isSkipped = skipped.includes(ex.id);
                                            return (
                                                <div key={ex.id} className={`bg-zinc-900 border border-zinc-800 rounded-[2.5rem] overflow-hidden shadow-2xl transition-all duration-300 ${isSkipped ? 'opacity-40 grayscale' : ''}`}>

                                                    {/* Header Card */}
                                                    <div className="p-6 bg-zinc-800/30 border-b border-zinc-800">
                                                        <div className="flex justify-between items-start mb-2">
                                                            <div className="flex-1 pr-2">
                                                                <h4 className="font-black text-white italic uppercase leading-none">{ex.name}</h4>
                                                                <p className="text-[9px] text-zinc-500 uppercase font-black tracking-widest mt-2">{ex.desc || 'Ausführung'}</p>
                                                            </div>
                                                            <div className="flex flex-col items-end gap-2">
                                                                <span className={`text-[9px] font-black bg-black px-2 py-1 rounded border border-zinc-800 ${phase === 'cardio' ? 'text-red-400' : 'text-blue-400'}`}>{ex.target}</span>
                                                                <div className="flex gap-2">
                                                                    <button onClick={() => getAlternative(ex)} className="text-zinc-400 hover:text-blue-400 bg-zinc-800 rounded-full p-1.5 transition-colors" title="KI Alternative">
                                                                        <Icon name="sparkles" size={16}/>
                                                                    </button>
                                                                    <button onClick={() => setExpandedDetails(expandedDetails === ex.id ? null : ex.id)} className="text-zinc-400 hover:text-white bg-zinc-800 rounded-full p-1.5 transition-colors" title="Info">
                                                                        <Icon name="info" size={16}/>
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {/* Details & AI Alternative Toggle */}
                                                        {expandedDetails === ex.id && (
                                                            <div className="mt-4 flex flex-col gap-3 animate-slide-down">
                                                                <div className="p-4 bg-black/50 rounded-2xl text-xs text-zinc-400 font-medium leading-relaxed border border-zinc-800">
                                                                    <span className="text-zinc-300 font-bold mb-1 block">Ausführung:</span>
                                                                    {ex.details || "Führe die Übung sauber und kontrolliert aus."}
                                                                </div>

                                                                {/* AI Response Area */}
                                                                {(isAiLoadingMap[ex.id] || aiExerciseResponses[ex.id]) && (
                                                                    <div className="p-4 bg-blue-900/20 rounded-2xl text-xs text-blue-100 font-medium leading-relaxed border border-blue-900/50">
                                                                        <span className="text-blue-400 font-bold mb-1 flex items-center gap-1"><Icon name="sparkles" size={14}/> KI Alternative:</span>
                                                                        {isAiLoadingMap[ex.id] ? (
                                                                            <span className="flex items-center gap-2 text-blue-300"><Icon name="loader-2" className="animate-spin" size={12}/> Coach sucht nach Übung...</span>
                                                                        ) : (
                                                                            <span className="whitespace-pre-wrap">{aiExerciseResponses[ex.id]}</span>
                                                                        )}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>

                                                    {/* Sets & Reps Input */}
                                                    {!isSkipped ? (
                                                        <div className="p-6 space-y-3">
                                                            {[...Array(ex.sets)].map((_, i) => (
                                                                <div key={i} className="flex gap-3 items-center">
                                                                    <div className="w-8 text-[9px] font-black text-zinc-700 bg-black py-2 rounded-lg text-center">S{i+1}</div>
                                                                    <input type="number" placeholder={ex.type === 'time' ? 'Min/Sek' : 'kg'} className="w-full bg-zinc-950 rounded-xl p-3 text-sm font-bold border border-zinc-800 focus:border-blue-500 outline-none text-center" 
                                                                        value={logs[ex.id]?.[i]?.weight || ''}
                                                                        onChange={e => setLogs(p => ({ ...p, [ex.id]: { ...p[ex.id], [i]: { ...p[ex.id]?.[i], weight: e.target.value } } }))}
                                                                    />
                                                                    <input type="number" placeholder={ex.type === 'time' ? 'Runden' : 'Reps'} className="w-full bg-zinc-950 rounded-xl p-3 text-sm font-bold border border-zinc-800 focus:border-blue-500 outline-none text-center"
                                                                        value={logs[ex.id]?.[i]?.reps || ''}
                                                                        onChange={e => setLogs(p => ({ ...p, [ex.id]: { ...p[ex.id], [i]: { ...p[ex.id]?.[i], reps: e.target.value } } }))}
                                                                    />
                                                                    <div className="w-8 flex justify-center">
                                                                        {logs[ex.id]?.[i]?.reps ? <Icon name="check-circle-2" size={20} className="text-emerald-500"/> : <div className="w-2 h-2 rounded-full bg-zinc-800"></div>}
                                                                    </div>
                                                                </div>
                                                            ))}

                                                            <div className="pt-3 flex justify-end">
                                                                <button onClick={() => toggleSkip(ex.id)} className="text-[10px] uppercase font-black tracking-widest text-zinc-600 hover:text-zinc-400 flex items-center gap-1">
                                                                    Überspringen <Icon name="chevron-right" size={12}/>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        <div className="p-6 flex justify-center items-center bg-zinc-950/50">
                                                            <button onClick={() => toggleSkip(ex.id)} className="bg-zinc-800 text-zinc-300 px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-zinc-700 transition-colors">
                                                                Wieder hinzufügen
                                                            </button>
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}

                                        <button onClick={finishWorkout} className={`w-full p-6 rounded-[2.5rem] font-black uppercase text-lg shadow-[0_10px_30px_rgba(0,0,0,0.3)] active:scale-95 transition-all flex items-center justify-center gap-3 mt-8 ${phase === 'cardio' ? 'bg-red-600 shadow-red-500/20' : 'bg-blue-600 shadow-blue-500/20'}`}>
                                            <Icon name="save" size={24} /> Training beenden
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'history' && (
                            <div className="space-y-4 animate-fade-in pb-20">
                                <h2 className="text-xl font-black italic mb-8 uppercase tracking-tighter text-zinc-500">Logbuch</h2>
                                {history.length === 0 ? (
                                    <div className="text-center py-20 text-zinc-700 font-bold uppercase tracking-widest text-xs border border-zinc-800/50 rounded-3xl">Noch keine Trainings geloggt</div>
                                ) : history.map(h => (
                                    <div key={h.id} className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2.5rem] relative shadow-lg">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1">{h.date}</span>
                                                <h3 className={`text-xl font-black italic uppercase tracking-tighter ${h.phase === 'cardio' ? 'text-red-400' : 'text-white'}`}>{PHASES[h.phase]?.splits[h.split]?.title || h.split}</h3>
                                            </div>
                                            <button onClick={() => {if(confirm("Log endgültig löschen?")) db.collection('artifacts').doc(fbAppId).collection('users').doc(user.uid).collection('logs').doc(h.id).delete()}} className="bg-zinc-950 p-2.5 rounded-xl text-zinc-700 hover:text-red-500 transition-colors">
                                                <Icon name="trash-2" size={16}/>
                                            </button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {Object.entries(h.exercises || {}).slice(0, 4).map(([id, sets]) => (
                                                <span key={id} className="text-[9px] font-bold text-zinc-400 bg-zinc-950 px-2 py-1 rounded-lg border border-zinc-800">
                                                    ✓ {Object.keys(sets).length} Sätze
                                                </span>
                                            ))}
                                            {(h.skippedExercises && h.skippedExercises.length > 0) && (
                                                <span className="text-[9px] font-bold text-zinc-600 bg-zinc-950 px-2 py-1 rounded-lg border border-zinc-800">
                                                    {h.skippedExercises.length} übersprungen
                                                </span>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-glass border-t border-zinc-800 px-10 py-6 flex justify-around rounded-t-[3rem] z-50">
                        <button onClick={() => setTab('workout')} className={`flex flex-col items-center gap-2 transition-transform ${tab === 'workout' ? 'text-blue-500 scale-110' : 'text-zinc-700 hover:text-zinc-400'}`}>
                            <Icon name="dumbbell" size={28} />
                            <span className="text-[8px] font-black uppercase tracking-widest">Train</span>
                        </button>
                        <button onClick={() => setTab('history')} className={`flex flex-col items-center gap-2 transition-transform ${tab === 'history' ? 'text-blue-500 scale-110' : 'text-zinc-700 hover:text-zinc-400'}`}>
                            <Icon name="history" size={28} />
                            <span className="text-[8px] font-black uppercase tracking-widest">Logs</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
