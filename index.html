<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atletica X-Five Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            background-color: #000;
            color: #f4f4f5;
        }
        .bg-glass { background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #000; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .phase-btn-active { background: #2563eb; color: white; box-shadow: 0 0 20px rgba(37,99,235,0.4); }
    </style>
</head>
<body class="overflow-x-hidden custom-scroll">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Dumbbell, History, ChevronRight, CheckCircle2, Clock, 
            Activity, Save, Trash2, RotateCcw, X, Layers, Sparkles, Send, Loader2, Zap
        } from 'https://esm.sh/lucide-react@0.344.0';
        
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc, serverTimestamp, query } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBbcTIag7ze1bPkmfxtnTxmR2WsJiZdr-8",
            authDomain: "atleticaapp-378da.firebaseapp.com",
            projectId: "atleticaapp-378da",
            storageBucket: "atleticaapp-378da.firebasestorage.app",
            messagingSenderId: "985508002445",
            appId: "1:985508002445:web:3e44d9e2a43e6b229300c4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'atleticaapp-378da';
        const apiKeyGemini = ""; 

        // --- Gemini AI Function ---
        const callGemini = async (prompt, system = "Du bist ein professioneller Atletica X-Five Fitnesscoach.") => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKeyGemini}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    })
                });
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "Coach ist gerade im Training. Bitte später versuchen.";
            } catch (e) { return "Verbindung zum Coach unterbrochen."; }
        };

        const PHASES = {
            p1: {
                name: "Phase 1: Fundament & Kraft (M 1-3)",
                splits: {
                    push: { title: "Push (Basis)", color: "blue", exercises: [
                        { id: "p1_1", name: "Face Pulls", target: "20 R", sets: 3, desc: "Prehab Schulter" },
                        { id: "p1_2", name: "Schrägbank (Kabel)", target: "6-8 R", sets: 3, desc: "Fokus Kraft" },
                        { id: "p1_3", name: "Brustpresse (Stehend)", target: "10 R", sets: 3 },
                        { id: "p1_4", name: "Seitheben am Kabel", target: "12 R", sets: 4 },
                        { id: "p1_5", name: "Frontheben", target: "12 R", sets: 3 },
                        { id: "p1_6", name: "Pushdowns (Seil)", target: "12 R", sets: 3 },
                        { id: "p1_7", name: "Überkopf Trizeps", target: "12 R", sets: 3 },
                        { id: "p1_8", name: "Cable Crunches", target: "15 R", sets: 4 },
                        { id: "p1_9", name: "Dips (Assist)", target: "Max", sets: 3 }
                    ]},
                    pull: { title: "Pull (Struktur)", color: "emerald", exercises: [
                        { id: "u1_1", name: "Face Pulls", target: "20 R", sets: 3 },
                        { id: "u1_2", name: "Latzug (Breit)", target: "8-10 R", sets: 3 },
                        { id: "u1_3", name: "Rudern am Kabel", target: "10 R", sets: 3 },
                        { id: "u1_4", name: "Einarmiges Rudern", target: "12 R", sets: 3 },
                        { id: "u1_5", name: "Reverse Flys", target: "15 R", sets: 3 },
                        { id: "u1_6", name: "Hammer Curls", target: "12 R", sets: 3 },
                        { id: "u1_7", name: "Bizeps Curls", target: "12 R", sets: 3 },
                        { id: "u1_8", name: "Sandsack HIIT", target: "10 Min", sets: 1, type: "time", desc: "Intervall 40/20" },
                        { id: "u1_9", name: "Reverse Plank", target: "45 Sek", sets: 3, type: "time" }
                    ]},
                    legs: { title: "Legs (Stärke)", color: "orange", exercises: [
                        { id: "l1_1", name: "Belt Squats (Kabel)", target: "8-10 R", sets: 4 },
                        { id: "l1_2", name: "Rumänisches KH", target: "12 R", sets: 3 },
                        { id: "l1_3", name: "Beinstrecker (Kabel)", target: "15 R", sets: 3 },
                        { id: "l1_4", name: "Beinbeuger (Stehend)", target: "15 R", sets: 3 },
                        { id: "l1_5", name: "Wadenheben", target: "20 R", sets: 4 },
                        { id: "l1_6", name: "Hyper-Ext Hold", target: "60 S", sets: 3, type: "time" },
                        { id: "l1_7", name: "Kickbacks am Kabel", target: "12 R", sets: 3 },
                        { id: "l1_8", name: "Beinheben", target: "Max", sets: 3 }
                    ]}
                }
            },
            p2: { 
                name: "Phase 2: Hypertrophie (M 4-6)", 
                splits: {
                    push: { title: "Push (Volumen)", color: "blue", exercises: [
                        { id: "p2_1", name: "Face Pulls", target: "20 R", sets: 3 },
                        { id: "p2_2", name: "Flachbank (Kabel)", target: "10-12 R", sets: 4 },
                        { id: "p2_3", name: "Incline Flys", target: "15 R", sets: 3 },
                        { id: "p2_4", name: "Arnold Press", target: "10 R", sets: 3 },
                        { id: "p2_5", name: "Seitheben (Einarmig)", target: "15 R", sets: 4 },
                        { id: "p2_6", name: "Skullcrushers (Kabel)", target: "12 R", sets: 3 },
                        { id: "p2_7", name: "Trizeps Kickbacks", target: "15 R", sets: 3 },
                        { id: "p2_8", name: "Crunches am Tau", target: "20 R", sets: 4 }
                    ]},
                    pull: { title: "Pull (Dichte)", color: "emerald", exercises: [
                        { id: "u2_1", name: "Latzug (Eng)", target: "10-12 R", sets: 3 },
                        { id: "u2_2", name: "Seal Rows (Kabel)", target: "12 R", sets: 3 },
                        { id: "u2_3", name: "Straight Arm Pull", target: "15 R", sets: 3 },
                        { id: "u2_4", name: "Rear Delt Rows", target: "15 R", sets: 4 },
                        { id: "u2_5", name: "Bayesian Curls", target: "12 R", sets: 4 },
                        { id: "u2_6", name: "Hammer Curls", target: "12 R", sets: 3 },
                        { id: "u2_7", name: "Sandsack HIIT", target: "15 Min", sets: 1, type: "time" }
                    ]},
                    legs: { title: "Legs (Volumen)", color: "orange", exercises: [
                        { id: "l2_1", name: "Goblet Squats", target: "12 R", sets: 4 },
                        { id: "l2_2", name: "Ausfallschritte", target: "12 R", sets: 3 },
                        { id: "l2_3", name: "Leg Extension", target: "15 R", sets: 4 },
                        { id: "l2_4", name: "Hyper-Ext (Weighted)", target: "12 R", sets: 4 }
                    ]}
                }
            },
            p3: { name: "Phase 3: Athletik (M 7-9)", splits: {
                push: { title: "Push (Explosiv)", color: "blue", exercises: [
                    { id: "p3_1", name: "Explosive Chest Press", target: "6 R", sets: 5 },
                    { id: "p3_2", name: "Landmine Press", target: "10 R", sets: 3 },
                    { id: "p3_3", name: "Pallof Press", target: "12 R", sets: 3 }
                ]},
                pull: { title: "Pull (Dynamik)", color: "emerald", exercises: [
                    { id: "u3_1", name: "Sandsack Power", target: "20 Min", sets: 1, type: "time" },
                    { id: "u3_2", name: "Single Arm Lat Pull", target: "12 R", sets: 3 }
                ]},
                legs: { title: "Legs (Unilateral)", color: "orange", exercises: [
                    { id: "l3_1", name: "Single Leg Squat", target: "10 R", sets: 3 },
                    { id: "l3_2", name: "Step Ups", target: "12 R", sets: 3 }
                ]}
            }},
            p4: { name: "Phase 4: Power (M 10-12)", splits: {
                push: { title: "Push (Max Power)", color: "blue", exercises: [
                    { id: "p4_1", name: "Heavy Chest Press", target: "3-5 R", sets: 5 },
                    { id: "p4_2", name: "Military Press", target: "6 R", sets: 4 }
                ]},
                pull: { title: "Pull (Max Power)", color: "emerald", exercises: [
                    { id: "u4_1", name: "Heavy Rows", target: "5 R", sets: 5 },
                    { id: "u4_2", name: "Rack Pulls (Kabel)", target: "8 R", sets: 3 }
                ]},
                legs: { title: "Legs (Max Power)", color: "orange", exercises: [
                    { id: "l4_1", name: "Heavy Belt Squats", target: "3 R", sets: 5 }
                ]}
            }}
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [tab, setTab] = useState('workout');
            const [phase, setPhase] = useState('p1');
            const [split, setSplit] = useState(null);
            const [logs, setLogs] = useState({});
            const [history, setHistory] = useState([]);
            const [timer, setTimer] = useState(0);
            const [timerActive, setTimerActive] = useState(false);
            const [chatOpen, setChatOpen] = useState(false);
            const [aiRes, setAiRes] = useState("");
            const [aiLoading, setAiLoading] = useState(false);
            const [chatMessages, setChatMessages] = useState([{ role: 'ai', text: 'Hey! Ich bin dein Atletica Coach. Bereit für die Gains?' }]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                        onAuthStateChanged(auth, u => setUser(u));
                    } catch (e) { console.error("Auth failed", e); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const qRef = collection(db, 'artifacts', appId, 'users', user.uid, 'logs');
                return onSnapshot(qRef, snap => {
                    const data = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setHistory(data.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)));
                }, e => console.error("Sync error", e));
            }, [user]);

            useEffect(() => {
                let interval;
                if (timerActive) interval = setInterval(() => setTimer(t => t + 1), 1000);
                return () => clearInterval(interval);
            }, [timerActive]);

            const finishWorkout = async () => {
                if (!user || !split) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'logs'), {
                        phase, split,
                        date: new Date().toLocaleDateString('de-DE'),
                        timestamp: serverTimestamp(),
                        exercises: logs,
                        duration: timer
                    });
                    setSplit(null); setLogs({}); setTimerActive(false); setTimer(0);
                    setTab('history');
                } catch (e) { console.error("Save error", e); }
            };

            const analyze = async (entry) => {
                setAiLoading(true); setAiRes("Coach wertet Daten aus...");
                const prompt = `Analysiere dieses Training: Split ${entry.split}, Phase ${entry.phase}. Übungen: ${JSON.stringify(entry.exercises)}. Gib motivierendes Feedback auf Deutsch.`;
                const text = await callGemini(prompt);
                setAiRes(text); setAiLoading(false);
            };

            return (
                <div className="flex flex-col max-w-md mx-auto min-h-screen">
                    <header className="p-6 bg-glass sticky top-0 z-40 flex justify-between items-center shadow-xl">
                        <div>
                            <h1 className="text-2xl font-black italic text-blue-500 uppercase tracking-tighter leading-none">ATLETICA X5</h1>
                            <p className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mt-1">{PHASES[phase]?.name}</p>
                        </div>
                        <div className={`px-4 py-1.5 rounded-full text-xs font-black border transition-all ${timerActive ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20 shadow-lg' : 'bg-zinc-800 text-zinc-500 border-zinc-700'}`}>
                            {Math.floor(timer/60)}:{(timer%60).toString().padStart(2,'0')}
                        </div>
                    </header>

                    <main className="flex-1 p-4 overflow-y-auto">
                        {tab === 'workout' && (
                            <div className="space-y-4 animate-fade-in">
                                {!split ? (
                                    <>
                                        <div className="grid grid-cols-4 gap-1 mb-6 bg-zinc-900/50 p-1 rounded-2xl border border-zinc-800">
                                            {Object.keys(PHASES).map(p => (
                                                <button key={p} onClick={() => setPhase(p)} className={`py-2 rounded-xl text-[10px] font-black uppercase transition-all ${phase === p ? 'phase-btn-active' : 'text-zinc-600'}`}>{p.toUpperCase()}</button>
                                            ))}
                                        </div>
                                        {Object.entries(PHASES[phase].splits).map(([key, s]) => (
                                            <button key={key} onClick={() => { setSplit(key); setTimer(0); setTimerActive(true); }}
                                                className="w-full bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] text-left hover:border-blue-500 transition-all flex justify-between items-center shadow-xl">
                                                <div>
                                                    <h3 className="text-2xl font-black italic uppercase tracking-tighter leading-tight">{s.title}</h3>
                                                    <p className="text-xs text-zinc-500 font-bold uppercase tracking-widest">{s.exercises.length} Übungen am Kabel</p>
                                                </div>
                                                <ChevronRight size={28}/>
                                            </button>
                                        ))}
                                    </>
                                ) : (
                                    <div className="space-y-6 pb-20">
                                        <button onClick={() => {if(confirm("Abbrechen?")) setSplit(null)}} className="text-[10px] font-black text-zinc-600 flex items-center gap-2 uppercase tracking-widest"><RotateCcw size={14}/> ABBRUCH</button>
                                        <h2 className="text-xl font-black italic text-blue-400 uppercase tracking-tighter">{PHASES[phase].splits[split].title}</h2>
                                        
                                        {PHASES[phase].splits[split].exercises.map(ex => (
                                            <div key={ex.id} className="bg-zinc-900 border border-zinc-800 rounded-[2.5rem] overflow-hidden shadow-2xl">
                                                <div className="p-6 bg-zinc-800/30 border-b border-zinc-800 flex justify-between items-center">
                                                    <div>
                                                        <h4 className="font-black text-white italic uppercase leading-none">{ex.name}</h4>
                                                        <p className="text-[9px] text-zinc-500 uppercase font-black tracking-widest mt-2">{ex.desc || 'Kabelzug'}</p>
                                                    </div>
                                                    <span className="text-[9px] font-black bg-black px-2 py-1 rounded text-blue-400 border border-zinc-800">{ex.target}</span>
                                                </div>
                                                <div className="p-6 space-y-3">
                                                    {[...Array(ex.sets)].map((_, i) => (
                                                        <div key={i} className="flex gap-3 items-center">
                                                            <div className="w-8 text-[9px] font-black text-zinc-700">S{i+1}</div>
                                                            <input type="number" placeholder="kg" className="w-full bg-zinc-950 rounded-xl p-3 text-sm font-bold border border-zinc-800 focus:border-blue-500 outline-none" 
                                                                value={logs[ex.id]?.[i]?.weight || ''}
                                                                onChange={e => setLogs(p => ({ ...p, [ex.id]: { ...p[ex.id], [i]: { ...p[ex.id]?.[i], weight: e.target.value } } }))}
                                                            />
                                                            <input type="number" placeholder="R" className="w-full bg-zinc-950 rounded-xl p-3 text-sm font-bold border border-zinc-800 focus:border-blue-500 outline-none"
                                                                value={logs[ex.id]?.[i]?.reps || ''}
                                                                onChange={e => setLogs(p => ({ ...p, [ex.id]: { ...p[ex.id], [i]: { ...p[ex.id]?.[i], reps: e.target.value } } }))}
                                                            />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={finishWorkout} className="w-full bg-blue-600 p-6 rounded-[2.5rem] font-black uppercase text-lg shadow-[0_10px_30px_rgba(37,99,235,0.3)] active:scale-95 transition-all flex items-center justify-center gap-3">
                                            <Save size={24} /> Training beenden
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === 'history' && (
                            <div className="space-y-4 animate-fade-in">
                                <h2 className="text-xl font-black italic mb-8 uppercase tracking-tighter text-zinc-500">Logbuch</h2>
                                {history.length === 0 ? (
                                    <div className="text-center py-20 text-zinc-700 font-bold uppercase tracking-widest text-xs">Noch keine Daten</div>
                                ) : history.map(h => (
                                    <div key={h.id} className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2.5rem] relative group shadow-lg">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className="text-[9px] font-black text-zinc-500 uppercase tracking-widest block mb-1">{h.date}</span>
                                                <h3 className="text-xl font-black italic uppercase text-white tracking-tighter">{PHASES[h.phase]?.splits[h.split]?.title || h.split}</h3>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => analyze(h)} className="p-2 text-blue-500 hover:bg-blue-500/10 rounded-xl"><Sparkles size={18}/></button>
                                                <button onClick={() => {if(confirm("Eintrag löschen?")) deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'logs', h.id))}} className="p-2 text-zinc-800 hover:text-red-500"><Trash2 size={18}/></button>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {aiRes && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md p-8 flex items-center justify-center animate-fade-in">
                            <div className="bg-zinc-900 border border-zinc-800 rounded-[3rem] p-10 max-w-sm w-full relative shadow-2xl">
                                <button onClick={() => setAiRes("")} className="absolute top-8 right-8 text-zinc-600"><X /></button>
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="bg-blue-600/20 p-3 rounded-2xl text-blue-500"><Sparkles size={24} /></div>
                                    <h3 className="font-black italic uppercase tracking-tighter text-xl">Coach Analyse</h3>
                                </div>
                                <div className="text-sm text-zinc-400 leading-relaxed font-medium whitespace-pre-wrap">{aiLoading ? <Loader2 className="animate-spin mx-auto text-blue-500"/> : aiRes}</div>
                                <button onClick={() => setAiRes("")} className="w-full mt-10 bg-zinc-800 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Verstanden</button>
                            </div>
                        </div>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-glass border-t border-zinc-800 px-10 py-6 flex justify-around rounded-t-[3rem] z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                        <button onClick={() => setTab('workout')} className={`flex flex-col items-center gap-2 ${tab === 'workout' ? 'text-blue-500 scale-110' : 'text-zinc-700'}`}><Dumbbell size={30} /><span className="text-[8px] font-black uppercase tracking-widest">Train</span></button>
                        <button onClick={() => setTab('history')} className={`flex flex-col items-center gap-2 ${tab === 'history' ? 'text-blue-500 scale-110' : 'text-zinc-700'}`}><History size={30} /><span className="text-[8px] font-black uppercase tracking-widest">Logs</span></button>
                        <button onClick={() => setChatOpen(true)} className={`flex flex-col items-center gap-2 ${chatOpen ? 'text-blue-500 scale-110' : 'text-zinc-700'}`}><Sparkles size={30} /><span className="text-[8px] font-black uppercase tracking-widest">Coach</span></button>
                    </nav>

                    {chatOpen && (
                        <div className="fixed inset-0 z-[150] bg-black flex flex-col animate-fade-in">
                            <header className="p-8 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                                <div className="flex items-center gap-4">
                                    <div className="bg-blue-600 p-3 rounded-2xl shadow-lg shadow-blue-500/20"><Sparkles size={24} className="text-white"/></div>
                                    <h2 className="font-black italic uppercase text-lg tracking-widest">Atletica AI</h2>
                                </div>
                                <button onClick={() => setChatOpen(false)} className="text-zinc-600 hover:text-white transition-colors"><X size={32}/></button>
                            </header>
                            <div className="flex-1 overflow-y-auto p-8 space-y-6">
                                {chatMessages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-5 rounded-[2rem] text-sm font-bold leading-relaxed shadow-xl ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-none' : 'bg-zinc-900 border border-zinc-800 rounded-bl-none text-zinc-300'}`}>{m.text}</div>
                                    </div>
                                ))}
                                {aiLoading && <Loader2 className="animate-spin text-zinc-800 mx-auto" />}
                            </div>
                            <div className="p-8 border-t border-zinc-800 bg-zinc-900/50">
                                <div className="flex gap-3 bg-zinc-800 p-2 rounded-[2rem] border border-zinc-700 shadow-inner">
                                    <input type="text" className="flex-1 bg-transparent border-none text-sm font-bold p-4 focus:ring-0 placeholder:text-zinc-600 outline-none" placeholder="Frag den Coach..." onKeyPress={async e => {
                                        if(e.key === 'Enter' && e.target.value.trim() && !aiLoading){
                                            const v = e.target.value; e.target.value = "";
                                            setChatMessages(p => [...p, {role: 'user', text: v}]);
                                            setAiLoading(true);
                                            const r = await callGemini(v);
                                            setChatMessages(p => [...p, {role: 'ai', text: r}]);
                                            setAiLoading(false);
                                        }
                                    }} />
                                    <button className="bg-blue-600 text-white p-4 rounded-full"><Send size={20}/></button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
